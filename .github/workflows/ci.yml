name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 6 * * 1'
  # workflow_dispatch lets `gh workflow run ci.yml --ref <branch>` re-fire
  # CI when a transient infra hiccup (runner OOM, network blip) leaves the
  # PR without a fresh run.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

# Lifecycle: CI runs the correctness gates that matter per-PR — type safety,
# lint, unit tests + coverage threshold, browser visual tests, security
# scanning, dep review, and the docs site build (so a docs PR can be reviewed
# with its rendered output as an artifact).
#
# What is NOT here, and why:
#   - tarball pack / packed-consumer smoke / SBOM / SLSA provenance →
#     release.yml. These are release-time concerns; running them on every
#     PR was a mismatch.
#   - `pnpm audit --prod` → release.yml. dependency-review-action covers
#     CVE intake per PR; the final blocking audit fires before publish.
#   - bespoke `scripts/audit-*.ts` files → migrated to vitest specs under
#     tests/contract/. They count toward the coverage gate and surface
#     failures through the normal test report instead of opaque
#     `scripts/audit-X.ts → process.exit(1)` mid-step.

jobs:
  # Install once, share the result. Per-job `pnpm install` is slow + the
  # CDN can swap a transitive between jobs in the same workflow if each
  # resolves independently. One install + one zstd tarball + restore in
  # every downstream job → every step runs against identical frozen bytes.
  install:
    name: Install dependencies (shared artifact)
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.fingerprint.outputs.cache-key }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - id: fingerprint
        run: |
          echo "cache-key=node-modules-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"

      - name: Pack node_modules
        run: |
          tar --use-compress-program=zstd -cf node_modules.tar.zst node_modules

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: node-modules-${{ steps.fingerprint.outputs.cache-key }}
          path: node_modules.tar.zst
          if-no-files-found: error
          retention-days: 1

  check:
    name: ${{ matrix.task }}
    needs: install
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `test:coverage:enforce` enforces the thresholds in
        # vitest.coverage.shared.ts. The vitest suite (under `test`) covers
        # unit + integration + contract assertions (the contract assertions
        # are the migrated former `scripts/audit-*.ts` checks expressed as
        # vitest specs under tests/contract/).
        task: [lint, typecheck, build, test, 'test:coverage:enforce']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: node-modules-${{ needs.install.outputs.cache-key }}

      - name: Restore node_modules
        run: tar --use-compress-program=unzstd -xf node_modules.tar.zst

      - name: Run ${{ matrix.task }}
        # 6GB worker heap — tsup's DTS bundler OOMs at the default ~1.7GB
        # on ubuntu-latest GitHub runners (the freeManifest literal is
        # 16k LOC of JSON-as-TS).
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm ${{ matrix.task }}

  browser-free:
    # FREE browser visual tests + screenshot snapshot diffing. The
    # `bootstrap --source github` step pulls 221 FREE GLTFs from KayKit's
    # upstream tag before the visual suite renders them under Chromium.
    name: FREE Browser Visuals
    needs: [install, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: node-modules-${{ needs.install.outputs.cache-key }}

      - name: Restore node_modules
        run: tar --use-compress-program=unzstd -xf node_modules.tar.zst

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Bootstrap FREE KayKit pack
        run: pnpm exec tsx src/cli/cli.ts bootstrap --source github --out public/assets/models

      - name: Run FREE browser visual tests
        run: pnpm test:browser:free

      - name: Upload browser screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: free-browser-screenshots
          path: tests/browser/__screenshots__/
          if-no-files-found: ignore
          retention-days: 7

  docs-site:
    # Astro Starlight build. Sibling project under docs-site/ has its own
    # pnpm install. Artifact uploaded so cd.yml's deploy job (on main push)
    # can pick it up.
    name: Docs Site Build
    needs: [install, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install library dependencies (typedoc walks src/ via the lib's deps)
        run: pnpm install --frozen-lockfile

      - name: Install docs-site dependencies
        run: cd docs-site && pnpm install --frozen-lockfile

      - name: Build docs site
        env:
          ASTRO_BASE: /declarative-hex-worlds/
          ASTRO_SITE: https://jbcom.github.io/declarative-hex-worlds
        run: pnpm docs-site:build

      - name: Upload docs-site artifact (for cd.yml Pages deploy)
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs-site/dist

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  semgrep:
    name: Semgrep SAST
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Semgrep
        run: python3 -m pip install --user 'semgrep==1.96.0'

      - name: Run Semgrep (OWASP Top 10 + Node.js)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          semgrep --config p/owasp-top-ten --config p/nodejs \
            --error --metrics=off \
            --exclude='src/manifest/free.ts' \
            --exclude='dist' \
            --exclude='node_modules' .
