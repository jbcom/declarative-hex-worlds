name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 6 * * 1'
  # workflow_dispatch lets `gh workflow run ci.yml --ref <branch>` re-fire
  # CI when a transient infra hiccup (runner OOM, network blip) leaves the
  # PR without a fresh run.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

# Lifecycle: CI runs the fast correctness gates per-PR — type safety, lint,
# unit tests, security scanning, dep review, and the docs site build.
#
# What is NOT here, and why:
#   - tarball pack / packed-consumer smoke / SBOM / SLSA provenance →
#     release.yml. These are release-time concerns; running them on every
#     PR was a mismatch.
#   - `pnpm audit --prod` → release.yml. dependency-review-action covers
#     CVE intake per PR; the final blocking audit fires before publish.
#   - bespoke `scripts/audit-*.ts` files → migrated to vitest specs under
#     tests/contract/. They count toward the coverage gate and surface
#     failures through the normal test report instead of opaque
#     `scripts/audit-X.ts → process.exit(1)` mid-step.
#   - Coverage job → the required merged ratchet. It runs unit coverage,
#     browser-free coverage, then `coverage:merge:enforce` so browser-only
#     bindings count where they can actually run.
#   - FREE Browser Visuals (`pnpm test:browser:free`) → local-only gate.
#     Bootstraps the KayKit FREE pack + runs a full Playwright visual suite
#     (~20 min). Run locally before changes to rendering / asset resolution /
#     browser-facing APIs. `pnpm test:browser:free` with HEX_WORLDS_ASSET_ROOT
#     pointing at a local models/ dir.

jobs:
  # Install once, share the result. Per-job `pnpm install` is slow + the
  # CDN can swap a transitive between jobs in the same workflow if each
  # resolves independently. One install + one zstd tarball + restore in
  # every downstream job → every step runs against identical frozen bytes.
  install:
    name: Install dependencies (shared artifact)
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.fingerprint.outputs.cache-key }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - id: fingerprint
        run: |
          echo "cache-key=node-modules-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"

      - name: Pack node_modules
        run: |
          tar --use-compress-program=zstd -cf node_modules.tar.zst node_modules

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: node-modules-${{ steps.fingerprint.outputs.cache-key }}
          path: node_modules.tar.zst
          if-no-files-found: error
          retention-days: 1

  check:
    name: ${{ matrix.task }}
    needs: install
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, build, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: node-modules-${{ needs.install.outputs.cache-key }}

      - name: Restore node_modules
        run: tar --use-compress-program=unzstd -xf node_modules.tar.zst

      - name: Run ${{ matrix.task }}
        # 6GB worker heap — tsup's DTS bundler OOMs at the default ~1.7GB
        # on ubuntu-latest GitHub runners (the freeManifest literal is
        # 16k LOC of JSON-as-TS).
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm ${{ matrix.task }}

  docs-site:
    # Astro Starlight build. Sibling project under docs-site/ has its own
    # pnpm install. Artifact uploaded so cd.yml's deploy job (on main push)
    # can pick it up.
    name: Docs Site Build
    needs: [install, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install library dependencies (typedoc walks src/ via the lib's deps)
        run: pnpm install --frozen-lockfile

      - name: Install docs-site dependencies
        run: cd docs-site && pnpm install --frozen-lockfile

      - name: Build docs site
        env:
          ASTRO_BASE: /declarative-hex-worlds/
          ASTRO_SITE: https://jbcom.github.io/declarative-hex-worlds
        run: pnpm docs-site:build

      - name: Upload docs-site artifact (for cd.yml Pages deploy)
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs-site/dist

  coverage:
    name: Coverage
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: node-modules-${{ needs.install.outputs.cache-key }}

      - name: Unpack node_modules
        run: tar --use-compress-program=unzstd -xf node_modules.tar.zst

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Bootstrap FREE models for browser coverage
        run: pnpm exec tsx src/cli/cli.ts bootstrap --source github --out models

      - name: Reset coverage output
        run: pnpm exec rimraf coverage

      - name: Collect unit coverage
        run: pnpm test:coverage

      - name: Collect browser-free coverage
        run: pnpm test:coverage:browser:free

      - name: Enforce merged coverage floor
        run: pnpm coverage:merge:enforce

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  semgrep:
    name: Semgrep SAST
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Semgrep
        run: python3 -m pip install --user 'semgrep==1.96.0'

      - name: Run Semgrep (OWASP Top 10 + Node.js)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          semgrep --config p/owasp-top-ten --config p/nodejs \
            --error --metrics=off \
            --exclude='src/manifest/free.ts' \
            --exclude='dist' \
            --exclude='node_modules' .
