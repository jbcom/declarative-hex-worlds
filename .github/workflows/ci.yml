name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, build, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        # Bump the worker heap for tsup's DTS bundler: the freeManifest literal
        # (16k LOC of JSON-as-TS) blows the default ~1.7GB worker heap on
        # ubuntu-latest GitHub runners. 4GB is comfortably under the runner's
        # 7GB limit while leaving headroom for the main process.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm ${{ matrix.task }}

  browser-free:
    name: FREE Browser Visuals
    needs: check
    runs-on: ubuntu-latest
    # PRD RB4: the FREE GLTF tree is no longer bundled in the tarball; it's
    # bootstrapped at install time by the upcoming CLI `bootstrap` command
    # (Phase RB). Until that command lands, browser visuals cannot load the
    # 221 FREE GLTFs. Gate the job behind `RUN_BROWSER_VISUALS=1` so the
    # default CI run stays green; Phase RB flips this to always-on once the
    # `bootstrap` step is wired in below.
    if: ${{ vars.RUN_BROWSER_VISUALS == '1' || github.event_name == 'schedule' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      # Phase RB will insert `pnpm cli bootstrap --source github` here so the
      # FREE GLTF tree is in place under public/assets before visuals run.

      - name: Run FREE browser visual tests
        run: pnpm test:browser:free

      - name: Upload browser screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: free-browser-screenshots
          path: tests/browser/__screenshots__/
          if-no-files-found: ignore
          retention-days: 7

  docs:
    name: Docs Build
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm test:docs-contract && pnpm test:api-docs && pnpm docs:build

  package:
    name: npm Pack
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Production audit (high+)
        run: pnpm audit --prod --audit-level=high

      - name: Audit FREE asset boundary
        run: pnpm test:assets

      - name: Audit workspace contract
        run: pnpm test:workspace

      - name: Audit workflow contract
        run: pnpm test:workflows

      - name: Build package
        run: pnpm build

      - name: Smoke built CLI
        run: pnpm test:cli

      - name: Run behavior-drift expectations
        run: pnpm expectations

      - name: Audit package boundary
        run: pnpm test:package

      - name: Smoke packed npm consumer
        run: pnpm test:consumer

      - name: Pack dry run
        run: pnpm pack:dry-run

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  semgrep:
    name: Semgrep SAST
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Semgrep
        run: python3 -m pip install --user 'semgrep==1.96.0'

      - name: Run Semgrep (OWASP Top 10 + Node.js)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          semgrep --config p/owasp-top-ten --config p/nodejs \
            --error --metrics=off \
            --exclude='packages/medieval-hexagon-gameboard/src/manifest/free.ts' \
            --exclude='packages/medieval-hexagon-gameboard/dist' \
            --exclude='node_modules' .
