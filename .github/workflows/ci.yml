name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 6 * * 1'
  # workflow_dispatch lets `gh workflow run ci.yml --ref <branch>` re-fire
  # CI when a transient infra hiccup (runner OOM, network blip) leaves the
  # PR without a fresh run.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'

# Lifecycle: CI runs the fast correctness gates per-PR — type safety, lint,
# unit tests, security scanning, dep review, and the docs site build.
#
# What is NOT here, and why:
#   - tarball pack / packed-consumer smoke / SBOM / SLSA provenance →
#     release.yml. These are release-time concerns; running them on every
#     PR was a mismatch.
#   - `pnpm audit --prod` → release.yml. dependency-review-action covers
#     CVE intake per PR; the final blocking audit fires before publish.
#   - bespoke `scripts/audit-*.ts` files → migrated to vitest specs under
#     tests/contract/. They count toward the coverage gate and surface
#     failures through the normal test report instead of opaque
#     `scripts/audit-X.ts → process.exit(1)` mid-step.
#   - Coverage job → the required merged ratchet. It runs unit coverage,
#     browser-free coverage, then `coverage:merge:enforce` so browser-only
#     bindings count where they can actually run.
#   - FREE Browser Visuals (`pnpm test:browser:free`) → local-only gate.
#     Bootstraps the KayKit FREE pack + runs a full Playwright visual suite
#     (~20 min). Run locally before changes to rendering / asset resolution /
#     browser-facing APIs. `pnpm test:browser:free` with HEX_WORLDS_ASSET_ROOT
#     pointing at a local models/ dir.

jobs:
  # Every job installs with `pnpm install --frozen-lockfile` against pnpm's
  # native content-addressed store cache (setup-node cache:'pnpm'). The
  # frozen lockfile guarantees identical resolved bytes across jobs, and the
  # store cache makes repeat installs fast — and, crucially for the workspace,
  # pnpm rebuilds the correct packages/*/node_modules symlink tree every time
  # (the old hand-packed node_modules tarball lost those links). This is the
  # "leverage each action's own caching" approach; no custom pack/restore.
  check:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, typecheck, build, test]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        # 6GB worker heap — tsup's DTS bundler still OOMs at the default ~1.7GB
        # on ubuntu-latest runners even after RFC0-G0 retired the 16k-LOC
        # freeManifest literal (the bundled manifest.json + the large public
        # type surface keep DTS memory-hungry). Revisit once ingest normalizes
        # KayKit into AssetSourceSpec and drops the giant manifest type.
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm ${{ matrix.task }}

  docs-site:
    # Astro Starlight build. packages/docs-site is a WORKSPACE member now, so a
    # single workspace install covers it (its typedoc plugins hoist via the root
    # .npmrc). Artifact uploaded so cd.yml's deploy job (on main push) can pick
    # it up.
    name: Docs Site Build
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install workspace dependencies (covers docs-site + the library)
        run: pnpm install --frozen-lockfile

      - name: Build docs site
        env:
          ASTRO_BASE: /declarative-hex-worlds/
          ASTRO_SITE: https://jonbogaty.com/declarative-hex-worlds
        run: pnpm docs-site:build

      - name: Upload docs-site artifact (for cd.yml Pages deploy)
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: packages/docs-site/dist

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    # Library scripts (test:coverage, coverage:merge:enforce), src/cli, and the
    # coverage/ output are all package-level — run this job's steps from the
    # library package. The install step overrides back to the workspace root.
    defaults:
      run:
        working-directory: packages/declarative-hex-worlds
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        # playwright is a library devDependency — resolve it from the package
        # (the job default working-directory), not the workspace root.
        run: pnpm exec playwright install --with-deps chromium

      - name: Bootstrap FREE models for browser coverage
        run: pnpm exec tsx src/cli/cli.ts bootstrap --source github --out models

      - name: Reset coverage output
        run: pnpm exec rimraf coverage

      - name: Collect unit coverage
        run: |
          set +e
          timeout --kill-after=30s 6m pnpm test:coverage
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if [ -s coverage/unit/coverage-final.json ] && { [ "$status" -eq 124 ] || [ "$status" -eq 137 ]; }; then
            echo "::warning::unit coverage timed out after emitting coverage-final.json; continuing to merged enforcement"
            exit 0
          fi
          exit "$status"

      - name: Collect browser-free coverage
        run: |
          set +e
          timeout --kill-after=30s 6m pnpm test:coverage:browser:free
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if [ -s coverage/browser-free/coverage-final.json ] && { [ "$status" -eq 124 ] || [ "$status" -eq 137 ]; }; then
            echo "::warning::browser-free coverage timed out after emitting coverage-final.json; continuing to merged enforcement"
            exit 0
          fi
          exit "$status"

      - name: Enforce merged coverage floor
        run: pnpm coverage:merge:enforce

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  semgrep:
    name: Semgrep SAST
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Semgrep
        run: python3 -m pip install --user 'semgrep==1.96.0'

      # pnpm-workspace.yaml + .npmrc are excluded: their findings are pnpm
      # supply-chain ADVISORIES (minimum-release-age / trust-policy /
      # block-exotic-sub-deps) with pnpm-10 semantics. We're pinned to
      # pnpm 9.15.9 and already harden via --frozen-lockfile everywhere,
      # a pinned packageManager, overrides for known CVEs, plus
      # minimumReleaseAge + onlyBuiltDependencies in the workspace file (pnpm 9
      # reads those from pnpm-workspace.yaml, not .npmrc — our .npmrc carries
      # ONLY hoist-pattern lines for docs-site's typedoc plugin resolution, so
      # the minimum-release-age rule firing on it is a false positive; the real
      # setting lives in the workspace file). The remaining flags don't apply to
      # the pinned toolchain.
      - name: Run Semgrep (OWASP Top 10 + Node.js)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          semgrep --config p/owasp-top-ten --config p/nodejs \
            --error --metrics=off \
            --exclude='free.ts' \
            --exclude='dist' \
            --exclude='docs/api' \
            --exclude='*.html' \
            --exclude='pnpm-workspace.yaml' \
            --exclude='.npmrc' \
            --exclude='node_modules' .
