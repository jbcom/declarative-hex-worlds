name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  release-please:
    name: Release Please
    if: "!contains(github.event.head_commit.message || '', '[skip actions]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Uses CI_GITHUB_TOKEN — the org-level PAT available across @jbcom
      # repos and the same pattern every other jbcom repo uses for
      # release-please. The GitHub App alternative (short-lived scoped
      # token) was considered (PRD A5) and rejected: provisioning the App
      # per-repo is operational toil; the org PAT is already in place.
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.CI_GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docs:
    # PRD F-Site-5 — deploy the Astro Starlight docs-site/ to GitHub Pages
    # on main push. Replaces the legacy vitepress deploy (F-Site-12 removes
    # the vitepress source entirely).
    name: Deploy Docs Site
    if: "!contains(github.event.head_commit.message || '', '[skip actions]') && !cancelled()"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install library dependencies
        # starlight-typedoc reads the library's src/ tree via typedoc; needs
        # the library's tsconfig + node_modules in place to resolve imports.
        run: pnpm install --frozen-lockfile

      - name: Install docs-site dependencies
        run: cd docs-site && pnpm install --frozen-lockfile

      - name: Build docs site
        env:
          ASTRO_BASE: /declarative-hex-worlds/
          ASTRO_SITE: https://jonbogaty.com/declarative-hex-worlds
        run: pnpm docs-site:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs-site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
