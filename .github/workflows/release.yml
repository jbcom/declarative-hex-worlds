name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  # PRD G1 — actions/attest-build-provenance needs attestations:write to attach
  # SLSA L3 build-provenance attestations to the release artifacts.
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Bootstrap FREE models for browser coverage
        run: pnpm exec tsx src/cli/cli.ts bootstrap --source github --out models

      - name: Production audit (high+)
        # Final blocking security gate before any bytes ship. Per-PR uses
        # dependency-review-action for CVE intake; this is the last word
        # before publish.
        run: pnpm audit --prod --audit-level=high

      - name: Verify package
        # Full verify chain: lint, typecheck, full vitest suite (incl.
        # contract specs under tests/contract/), and the merged unit +
        # browser-free coverage threshold. Same gates CI ran per-PR; re-run
        # at release to catch any drift between PR-CI and release time.
        run: |
          pnpm lint
          pnpm typecheck
          pnpm coverage:all:enforce

      - name: Build package
        run: pnpm build

      - name: Pack tarball for attestation
        # Pack BEFORE publishing so we can attest the exact bytes that ship.
        # `npm pack --json` writes the tarball into the cwd; capture its
        # filename for the attestation + release-assets steps.
        id: pack
        run: |
          PACK_JSON=$(npm pack --json)
          TARBALL=$(echo "$PACK_JSON" | node -e 'let d=""; process.stdin.on("data", c=>d+=c).on("end", ()=>{const a=JSON.parse(d); process.stdout.write(a[0].filename)})')
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance (SLSA L3)
        # PRD G1. Cryptographically attests that this exact tarball was built
        # by this exact workflow run on GitHub-hosted infrastructure.
        # Consumers verify via `npm audit signatures` or `gh attestation verify`.
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Generate SBOM (CycloneDX)
        # PRD G2. CycloneDX 1.6 SBOM listing the full prod-dep tree of the
        # published package. Attached as a release asset by the next step.
        run: |
          pnpm exec cyclonedx-npm \
            --output-format json \
            --output-file sbom.cdx.json \
            --omit dev

      - name: Attach SBOM + tarball to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2.4.1
        with:
          files: |
            ${{ steps.pack.outputs.tarball }}
            sbom.cdx.json

      - name: Publish to npm with OIDC trusted publishing
        if: github.event_name == 'release'
        # The first `declarative-hex-worlds@1.0.0` publish was issued
        # locally with an automation token (see PR body) so OIDC trusted
        # publishing could be configured on npmjs.com against this
        # workflow path + ref before the second publish.
        #
        # From v1.0.1 onward this workflow runs with NO `NODE_AUTH_TOKEN`
        # — npm sees `id-token: write` at the job's permissions and
        # exchanges the GitHub Actions OIDC token for a registry
        # credential automatically. `--provenance` attaches the SLSA
        # provenance statement to the publish; the `attest-build-provenance`
        # step above attaches the SLSA L3 build provenance to the tarball
        # bytes for `npm audit signatures` verification.
        run: npm publish ${{ steps.pack.outputs.tarball }} --access public --provenance

      - name: Verify published package signatures
        if: github.event_name == 'release'
        # Install the just-published version into a temp directory and verify
        # that the package's signatures are valid via npm audit signatures.
        # Failure here is a signal that provenance attestation was not attached
        # by the registry — the package is still published but this notifies us.
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          npm init -y
          npm install "declarative-hex-worlds@$RELEASE_TAG"
          npm audit signatures
          cd -
          rm -rf "$TMPDIR"
