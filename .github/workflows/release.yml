name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  # PRD G1 — actions/attest-build-provenance needs attestations:write to attach
  # SLSA L3 build-provenance attestations to the release artifacts.
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: '22'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package
        run: pnpm test:ci

      - name: Build package
        run: pnpm build

      - name: Pack tarball for attestation
        # Pack BEFORE publishing so we can attest the exact bytes that ship.
        # `npm pack --json` writes the tarball into the cwd; capture its
        # filename for the attestation + release-assets steps.
        id: pack
        run: |
          PACK_JSON=$(npm pack --json)
          TARBALL=$(echo "$PACK_JSON" | node -e 'let d=""; process.stdin.on("data", c=>d+=c).on("end", ()=>{const a=JSON.parse(d); process.stdout.write(a[0].filename)})')
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance (SLSA L3)
        # PRD G1. Cryptographically attests that this exact tarball was built
        # by this exact workflow run on GitHub-hosted infrastructure.
        # Consumers verify via `npm audit signatures` or `gh attestation verify`.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Generate SBOM (CycloneDX)
        # PRD G2. CycloneDX 1.6 SBOM listing the full prod-dep tree of the
        # published package. Attached as a release asset by the next step.
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@latest \
            --output-format json \
            --output-file sbom.cdx.json \
            --omit dev

      - name: Attach SBOM + tarball to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.4.1
        with:
          files: |
            ${{ steps.pack.outputs.tarball }}
            sbom.cdx.json

      - name: Publish to npm
        # Auth strategy:
        # - **First publish:** `NPM_TOKEN` repo secret (the
        #   user-generated automation token). The package does not yet
        #   exist on the registry, so OIDC trusted publishing is not
        #   configured. The token authenticates the create+publish.
        # - **Subsequent publishes:** once the user configures OIDC
        #   trusted publishing on npmjs.com against this workflow path
        #   + ref, the `NPM_TOKEN` secret can be deleted. With no
        #   token set, `setup-node` leaves `NODE_AUTH_TOKEN` empty and
        #   npm falls through to OIDC (`id-token: write` is already
        #   declared at the job permissions level).
        # In both modes, `--provenance` attaches the SLSA provenance
        # statement to the publish.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish ${{ steps.pack.outputs.tarball }} --access public --provenance
