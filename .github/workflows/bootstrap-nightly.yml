name: Bootstrap nightly (GitHub source)

# Scheduled-only — runs once a day against the live upstream KayKit FREE
# tarball on GitHub. NOT per-PR (rate-limited / network-dependent). The
# per-PR pipeline uses the synthetic-zip end-to-end test in
# `tests/integration/bootstrap/` which has no network dependency.
#
# Triggers:
#  - schedule: daily at 04:00 UTC
#  - workflow_dispatch: manual trigger for verification
#  - pull_request: paths filter — bootstrap core changes re-verify live download
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/cli/commands/bootstrap/**'

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  HEX_WORLDS_OUT_ROOT: /tmp

jobs:
  bootstrap-github-source:
    name: Bootstrap FREE edition from GitHub
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build

      - name: Bootstrap FREE assets from GitHub source
        run: |
          mkdir -p /tmp/bootstrap-target
          node dist/cli.js bootstrap \
            --source github \
            --out /tmp/bootstrap-target \
            --json > /tmp/bootstrap-result.json
          cat /tmp/bootstrap-result.json

      - name: Verify bootstrap integrity sidecar
        run: node dist/cli.js bootstrap --verify --out /tmp/bootstrap-target

      - name: Assert expected GLTF count
        run: |
          node -e "
            const r = require('/tmp/bootstrap-result.json');
            if (r.fileCount < 221) {
              throw new Error('bootstrap from GitHub produced ' + r.fileCount + ' files; expected >= 221');
            }
            console.log('GitHub bootstrap produced ' + r.fileCount + ' files (' + r.totalBytes + ' bytes)');
          "

      - name: Upload bootstrap result
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: bootstrap-result-${{ github.run_id }}
          path: /tmp/bootstrap-result.json
          retention-days: 14
