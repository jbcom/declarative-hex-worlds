name: Benchmarks

# Non-blocking performance signal. Runs on main merges and nightly so trends
# have artifacts even when no release gate is involved. PRs re-run it only when
# benchmark wiring changes.
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    paths:
      - '.github/workflows/benchmarks.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tests/perf/**'

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  NODE_OPTIONS: --max-old-space-size=6144

jobs:
  benchmarks:
    name: Vitest benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build benchmark inputs
        run: pnpm build

      - name: Prepare benchmark metadata
        run: |
          mkdir -p benchmark-results
          node -e "
            const { writeFileSync } = require('node:fs');
            const metadata = {
              workflow: 'benchmarks',
              command: 'pnpm bench',
              node: process.version,
              ref: process.env.GITHUB_REF,
              sha: process.env.GITHUB_SHA,
              runId: process.env.GITHUB_RUN_ID,
              runAttempt: process.env.GITHUB_RUN_ATTEMPT,
              eventName: process.env.GITHUB_EVENT_NAME,
            };
            writeFileSync('benchmark-results/metadata.json', JSON.stringify(metadata, null, 2) + '\n');
          "
          node --version > benchmark-results/node-version.txt
          pnpm --version > benchmark-results/pnpm-version.txt

      - name: Run benchmarks
        shell: bash
        run: |
          set -o pipefail
          pnpm bench 2>&1 | tee benchmark-results/vitest-bench.txt

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmark-results
          if-no-files-found: error
          retention-days: 30
